<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixelator</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #191c25;
      --border: #2a2e3a;
      --text: #e8eaf0;
      --muted: #9aa0b0;
      --accent: #f5c542;
      --accent-hover: #ffd85e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 20px;
    }

    .app {
      width: 100%;
      max-width: 640px;
    }

    h1 {
      font-size: 1.6rem;
      margin: 0 0 4px;
    }

    .subtitle {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 0.95rem;
    }

    .banana {
      font-size: 1.6rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      resize: vertical;
      padding: 14px;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    button {
      padding: 13px 20px;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1300;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .result {
      margin-top: 28px;
      min-height: 40px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .card img {
      display: block;
      width: 100%;
    }

    .card .caption {
      padding: 12px 16px;
      color: var(--muted);
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .card .caption a {
      color: var(--accent);
      text-decoration: none;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status.error {
      color: #ff7a7a;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>👾 Pixelator</h1>
    <p class="subtitle">Describe an a subject, image will be printed below in retro game 16-bit pixel art style.</p>

    <form id="form">
      <textarea id="prompt"
        placeholder="e.g. A cozy reading nook by a rainy window, warm lamplight, watercolor style"></textarea>
      <button id="submit" type="submit">Generate image</button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <script>
    const form = document.getElementById("form");
    const promptEl = document.getElementById("prompt");
    const submitBtn = document.getElementById("submit");
    const result = document.getElementById("result");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const prompt = promptEl.value.trim();
      if (!prompt) {
        result.innerHTML = '<p class="status error">Please enter a description.</p>';
        return;
      }

      submitBtn.disabled = true;
      result.innerHTML = '<p class="status"><span class="spinner"></span>Generating…</p>';

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });
        const data = await res.json();

        if (!res.ok) {
          result.innerHTML = `<p class="status error">${data.error || "Something went wrong."}</p>`;
          return;
        }

        result.innerHTML = `
          <div class="card">
            <img src="${data.image}" alt="Generated image" />
            <div class="caption">
              <span>${escapeHtml(prompt)}</span>
              <a href="${data.image}" download="generated.png">Download</a>
            </div>
          </div>`;
      } catch (err) {
        result.innerHTML = `<p class="status error">Network error: ${err.message}</p>`;
      } finally {
        submitBtn.disabled = false;
      }
    });

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      })[c]);
    }
  </script>
</body>

</html>
